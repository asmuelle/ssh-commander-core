[advisories]
version = 2
yanked = "deny"
ignore = [
    # rsa: Marvin timing side-channel. No fixed release exists; pulled in
    # transitively via russh 0.61 → ssh-key → rsa for RSA key support.
    # Low practical risk for an interactive SSH client; revisit when the
    # rsa crate ships a constant-time fix.
    "RUSTSEC-2023-0071",
    # Unmaintained / unsound transitive deps with no actionable upgrade path:
    "RUSTSEC-2025-0052", # async-std discontinued (via the `ftp` feature → suppaftp)
    "RUSTSEC-2024-0436", # paste no longer maintained (deep transitive)
    "RUSTSEC-2026-0097", # rand unsoundness in a custom-logger edge case (transitive)
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
