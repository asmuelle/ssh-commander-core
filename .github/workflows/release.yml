name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish workspace to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ws=$(grep -E '^version' Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$ws" ]; then
            echo "::error::Tag ($tag) does not match workspace version ($ws)"
            exit 1
          fi

      - run: cargo test --workspace --all-targets --no-fail-fast

      - name: Publish ssh-commander-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ssh-commander-core

      - name: Publish ssh-commander-pg-parquet
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ssh-commander-pg-parquet

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes
